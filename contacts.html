<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contacts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Raleway:wght@700&family=Roboto:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/modern-normalize.css" />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>

  <!-- Страница Контакты -->
  <body>
    <!-- Шапка Контакты -->
    <header class="header-page">
      <div class="container header-main">
        <nav class="header-nav">
          <a href="./index.html" lang="en" class="header-logo link-reset"
            ><span class="accent">Web</span>Studio</a
          >
          <ul class="header-list list-reset">
            <li class="nav-item">
              <a href="./index.html" class="nav-link link-reset">Студия</a>
            </li>
            <li class="nav-item">
              <a href="./portfolio.html" class="nav-link link-reset"
                >Портфолио</a
              >
            </li>
            <li class="nav-item">
              <a href="./contacts.html" class="nav-link link-reset current"
                >Контакты</a
              >
            </li>
          </ul>
        </nav>
        <ul class="header-contacts list-reset">
          <li class="nav-item">
            <a
              href="mailto:info@devstudio.com"
              class="header-contacts-link link-reset"
              aria-label="Почта"
            >
              <svg class="nav-contacts-svg" width="16" height="16">
                <use href="./images/icons.svg#icon-envelope"></use>
              </svg>
              info@devstudio.com</a
            >
          </li>
          <li class="nav-item">
            <a
              href="tel:+380961111111"
              class="header-contacts-link link-reset"
              aria-label="Телефон"
              ><svg class="nav-contacts-svg" width="16" height="16">
                <use href="./images/icons.svg#icon-smartphone"></use>
              </svg>
              +38 096 111 11 11</a
            >
          </li>
        </ul>
      </div>
    </header>

    <main>
      <section class="section-contacts">
        <div class="container">
          <h1 class="visually-hidden">Страница контакты</h1>

          <h2 class="section-title">Страница находится в стадии разработки</h2>
        </div>
      </section>
    </main>

    <!-- Подвал Контакты -->
    <footer class="footer-page">
      <div class="container">
        <div class="footer-contacts">
          <a href="./index.html" lang="en" class="footer-logo link-reset"
            ><span class="accent">Web</span>Studio</a
          >
          <address class="footer-address">
            <ul class="footer-list list-reset">
              <li class="footer-address-item">
                г. Киев, пр-т Леси Украинки, 26
              </li>
              <li class="footer-item">
                <a
                  href="mailto:info@example.com"
                  class="footer-contacts-link link-reset"
                  >info@example.com</a
                >
              </li>
              <li>
                <a
                  href="tel:+380991111111"
                  class="footer-contacts-link link-reset"
                  >+38 099 111 11 11</a
                >
              </li>
            </ul>
          </address>
        </div>

        <div class="footer-social">
          <p class="footer-text">присоединяйтесь</p>
          <ul class="footer-social-list list-reset">
            <li class="footer-social-item">
              <a
                href="#"
                class="footer-social-link link-reset"
                aria-label="Инстаграм"
                ><svg class="footer-social-svg" width="20" height="20">
                  <use href="./images/icons.svg#icon-instagram-footer"></use>
                </svg>
              </a>
            </li>

            <li class="footer-social-item">
              <a
                href="#"
                class="footer-social-link link-reset"
                aria-label="Твиттер"
                ><svg class="footer-social-svg" width="20" height="20">
                  <use href="./images/icons.svg#icon-twitter-footer"></use>
                </svg>
              </a>
            </li>

            <li class="footer-social-item">
              <a
                href="#"
                class="footer-social-link link-reset"
                aria-label="Фейсбук"
                ><svg class="footer-social-svg" width="20" height="20">
                  <use href="./images/icons.svg#icon-facebook-footer"></use>
                </svg>
              </a>
            </li>

            <li class="footer-social-item">
              <a
                href="#"
                class="footer-social-link link-reset"
                aria-label="Линкедин"
                ><svg class="footer-social-svg" width="20" height="20">
                  <use href="./images/icons.svg#icon-linkedin-footer"></use>
                </svg>
              </a>
            </li>
          </ul>
        </div>

        <form class="footer-form">
          <p class="footer-form-text">Подпишитесь на рассылку</p>
          <div class="footer-form-group">
            <input
              type="email"
              name="subscription-email"
              placeholder="E-mail"
              class="footer-form-input"
            />

            <button type="submit" class="footer-form-button">
              Подписаться
              <svg class="footer-form-svg" width="24" height="24">
                <use href="./images/icons.svg#icon-subscription-email"></use>
              </svg>
            </button>
          </div>
        </form>
      </div>
    </footer>
  </body>
</html>
